<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun International — AI-Driven Creative Control Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  /* Sun International Brand Colors */
  --teal:#D4A843;--teal-light:#E8C86B;--teal-dark:#B08930;
  --navy:#0A214F;--gold:#D4A843;--gold-light:#E8C86B;--gold-dark:#B08930;
  --platinum:#7A99AC;--silver:#8A8D8F;
  /* UI Colors */
  --black:#060B14;--dark:#0C1220;--dark2:#111827;--dark-card:rgba(15,23,42,0.6);--dark-hover:rgba(20,30,55,0.7);
  --text:#E8ECF2;--text-dim:#A0AABB;--text-muted:#64748B;
  --green:#10B981;--green-bg:rgba(16,185,129,0.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.12);
  --purple:#8B5CF6;--purple-bg:rgba(139,92,246,0.12);
  --orange:#F59E0B;--orange-bg:rgba(245,158,11,0.12);
  --cyan:#06B6D4;--cyan-bg:rgba(6,182,212,0.12);
  --pink:#EC4899;--pink-bg:rgba(236,72,153,0.12);
  --sidebar-w:250px;
  /* Glass */
  --glass:rgba(15,23,42,0.45);--glass-border:rgba(255,255,255,0.08);--glass-hover:rgba(255,255,255,0.04);
  --glass-light:rgba(255,255,255,0.04);--glass-accent:rgba(212,168,67,0.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--text);overflow:hidden;height:100vh;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(212,168,67,0.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(10,33,79,0.1) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(132,117,78,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
a{color:var(--teal-light);text-decoration:none;}

/* ===== GLASS UTILITY ===== */
.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid var(--glass-border);}
.glass-light{background:var(--glass-light);backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);border:1px solid var(--glass-border);}
.glass-strong{background:rgba(15,23,42,0.7);backdrop-filter:blur(30px) saturate(1.6);-webkit-backdrop-filter:blur(30px) saturate(1.6);border:1px solid rgba(255,255,255,0.1);}

/* ===== TOPBAR ===== */
.topbar{height:58px;display:flex;align-items:center;padding:0 24px;background:rgba(12,18,32,0.7);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid rgba(255,255,255,0.06);position:relative;z-index:100;gap:20px;}
.topbar-left{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.si-logo{height:28px;width:auto;opacity:0.95;filter:brightness(1.1);}
.logo-text{font-size:15px;font-weight:600;letter-spacing:0.2px;white-space:nowrap;}
.logo-text b{color:var(--teal-light);}
.topbar-center{flex:1;display:flex;justify-content:center;padding:0 24px;min-width:0;}
.search-wrap{position:relative;width:100%;max-width:400px;}
.global-search{width:100%;padding:8px 14px 8px 36px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.25s;backdrop-filter:blur(8px);}
.global-search:focus{border-color:var(--teal);background:rgba(255,255,255,0.06);box-shadow:0 0 0 3px rgba(212,168,67,0.15);}
.global-search::placeholder{color:var(--text-muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ai-live{display:flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:20px;font-size:11px;color:var(--green);font-weight:500;backdrop-filter:blur(8px);white-space:nowrap;}
.ai-live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4);}50%{box-shadow:0 0 0 5px rgba(16,185,129,0);}}
.top-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:14px;transition:all 0.2s;position:relative;backdrop-filter:blur(8px);}
.top-btn:hover{border-color:rgba(232,200,107,0.3);color:var(--teal-light);background:rgba(212,168,67,0.08);}
.top-btn .badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--red);border-radius:50%;font-size:8px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;border:2px solid var(--dark);}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:white;cursor:pointer;border:2px solid rgba(232,200,107,0.3);}

/* ===== LAYOUT ===== */
.app{display:flex;height:calc(100vh - 58px);position:relative;z-index:1;}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);background:rgba(12,18,32,0.5);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;padding:16px 0;}
.sb-section{margin-bottom:16px;}
.sb-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);padding:0 18px;margin-bottom:6px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text-muted);transition:all 0.2s;position:relative;user-select:none;border-radius:0;}
.sb-item:hover{background:rgba(212,168,67,0.06);color:var(--text-dim);}
.sb-item.active{color:var(--teal-light);background:rgba(212,168,67,0.1);}
.sb-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--teal-light);border-radius:0 2px 2px 0;}
.sb-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.4;}
.sb-item.active svg{opacity:1;}
.sb-item .sb-badge{margin-left:auto;font-size:9px;font-weight:600;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;padding:2px 6px;border-radius:4px;}
.sb-item .sb-count{margin-left:auto;font-size:10px;background:rgba(255,255,255,0.05);padding:1px 7px;border-radius:8px;font-weight:500;}
.sb-divider{height:1px;background:rgba(255,255,255,0.04);margin:8px 18px;}
.prop-item{display:flex;align-items:center;gap:8px;padding:6px 18px;cursor:pointer;font-size:11.5px;font-weight:500;color:var(--text-muted);transition:all 0.15s;position:relative;}
.prop-item:hover{background:rgba(212,168,67,0.05);color:var(--text-dim);}
.prop-item.active{color:var(--teal-light);background:rgba(212,168,67,0.08);}
.prop-item.active::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:2px;background:var(--teal-light);border-radius:0 2px 2px 0;}
.prop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.prop-count{margin-left:auto;font-size:10px;color:var(--text-muted);}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 28px;scroll-behavior:smooth;}
.page{display:none;animation:pageIn 0.35s ease-out;}
.page.active{display:block;}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== SHARED COMPONENTS ===== */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;}
.page-header h1 b{color:var(--teal-light);font-weight:700;}
.header-actions{display:flex;gap:8px;align-items:center;}

.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;}
.btn-gold:hover{box-shadow:0 4px 16px rgba(212,168,67,0.3);transform:translateY(-1px);}
.btn-dark{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px);}
.btn-dark:hover{border-color:rgba(232,200,107,0.25);background:rgba(212,168,67,0.06);}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;}
.btn-outline{background:transparent;border:1px solid rgba(232,200,107,0.25);color:var(--teal-light);padding:5px 10px;font-size:11px;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-outline:hover{background:rgba(212,168,67,0.1);}

/* Cards — Glassmorphism */
.card{background:var(--glass);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border-radius:14px;border:1px solid var(--glass-border);overflow:hidden;transition:all 0.25s;}
.card:hover{border-color:rgba(255,255,255,0.12);box-shadow:0 8px 32px rgba(0,0,0,0.15);}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02);}
.card-header h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;}
.card-body{padding:18px;}
.card-gold{border-color:rgba(232,200,107,0.15);}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stats-row.cols-5{grid-template-columns:repeat(5,1fr);}
.stats-row.cols-3{grid-template-columns:repeat(3,1fr);}
.stat{background:var(--glass);backdrop-filter:blur(16px) saturate(1.3);-webkit-backdrop-filter:blur(16px) saturate(1.3);border-radius:12px;padding:16px 18px;border:1px solid var(--glass-border);transition:all 0.2s;}
.stat:hover{border-color:rgba(232,200,107,0.15);background:rgba(212,168,67,0.04);}
.stat-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;}
.stat-val{font-size:26px;font-weight:800;margin-bottom:3px;letter-spacing:-0.5px;}
.stat-val b{color:var(--teal-light);}
.stat-sub{font-size:11px;color:var(--text-muted);}
.stat-sub .up{color:var(--green);}
.stat-sub .down{color:var(--red);}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.full-w{grid-column:1/-1;}

.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-red{background:var(--red-bg);color:var(--red);}
.tag-blue{background:var(--blue-bg);color:var(--blue);}
.tag-orange{background:var(--orange-bg);color:var(--orange);}
.tag-purple{background:var(--purple-bg);color:var(--purple);}
.tag-gold{background:rgba(232,200,107,0.1);color:var(--teal-light);}
.tag-cyan{background:var(--cyan-bg);color:var(--cyan);}
.tag-teal{background:rgba(212,168,67,0.12);color:var(--teal-light);}

.ai-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(212,168,67,0.1);color:var(--teal-light);border:1px solid rgba(232,200,107,0.15);}
.ai-icon-sm{width:18px;height:18px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;color:white;}

/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05);}
.tbl td{font-size:12px;padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);}
.tbl tr:hover td{background:rgba(212,168,67,0.03);}
.tbl .name-cell{display:flex;align-items:center;gap:8px;font-weight:500;}

.mini-bar{width:70px;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:3px;transition:width 0.8s ease-out;}

/* Chart bars */
.bars{display:flex;align-items:flex-end;gap:6px;height:140px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.6s ease-out;position:relative;cursor:pointer;background:linear-gradient(0deg,rgba(212,168,67,0.6),rgba(232,200,107,0.8));}
.bar:hover{filter:brightness(1.2);}
.bar-tip{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity 0.2s;}
.bar:hover .bar-tip{opacity:1;}
.bar-lbl{font-size:9px;color:var(--text-muted);text-align:center;}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:20px;}
.donut{width:120px;height:120px;position:relative;flex-shrink:0;}
.donut svg{width:100%;height:100%;transform:rotate(-90deg);}
.donut circle{fill:none;stroke-width:10;}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-center .big{font-size:22px;font-weight:800;color:var(--teal-light);display:block;}
.donut-center .sm{font-size:9px;color:var(--text-muted);}
.legend{display:flex;flex-direction:column;gap:8px;}
.legend-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.legend-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.legend-val{margin-left:auto;font-weight:600;color:var(--text);}

/* Progress */
.progress{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin:6px 0;}
.progress-fill{height:100%;border-radius:3px;transition:width 1s ease-out;}

/* Tabs */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,0.04);padding:3px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);}
.tab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.tab.active{background:rgba(212,168,67,0.15);color:var(--teal-light);}

/* Filter chips */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fchip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:var(--text-muted);transition:all 0.15s;font-family:'DM Sans',sans-serif;backdrop-filter:blur(8px);}
.fchip:hover{border-color:rgba(232,200,107,0.2);color:var(--text);}
.fchip.active{background:rgba(212,168,67,0.12);border-color:rgba(232,200,107,0.3);color:var(--teal-light);}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kanban-col{background:rgba(255,255,255,0.02);border-radius:12px;padding:12px;min-height:200px;border:1px solid rgba(255,255,255,0.03);}
.kanban-col-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.kanban-col-header .count{font-size:10px;background:rgba(255,255,255,0.05);padding:1px 6px;border-radius:8px;font-weight:500;color:var(--text-muted);}
.kanban-card{background:var(--glass);backdrop-filter:blur(12px);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);cursor:grab;transition:all 0.2s;font-size:12px;}
.kanban-card:hover{border-color:rgba(232,200,107,0.2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,0.2);}
.kanban-card .kc-title{font-weight:600;margin-bottom:4px;}
.kanban-card .kc-meta{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
.kanban-card .kc-prop{font-size:10px;color:var(--teal-light);}

/* Timeline */
.timeline{position:relative;padding-left:20px;}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:rgba(232,200,107,0.15);}
.tl-item{position:relative;margin-bottom:14px;padding-left:16px;}
.tl-item::before{content:'';position:absolute;left:-17px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--teal-light);border:2px solid var(--dark2);}
.tl-item.tl-pending::before{background:var(--text-muted);}
.tl-item .tl-time{font-size:10px;color:var(--text-muted);margin-bottom:2px;}
.tl-item .tl-text{font-size:12px;line-height:1.5;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:rgba(255,255,255,0.03);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.cal-hdr{background:rgba(15,23,42,0.6);backdrop-filter:blur(12px);padding:10px 6px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);}
.cal-day{background:rgba(15,23,42,0.35);backdrop-filter:blur(8px);min-height:90px;padding:6px;position:relative;cursor:pointer;transition:all 0.15s;}
.cal-day:hover{background:rgba(212,168,67,0.04);}
.cal-day.other{opacity:0.2;}
.cal-day.today{background:rgba(212,168,67,0.06);}
.cal-day.today .dn{background:var(--teal);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.dn{font-size:11px;font-weight:500;color:var(--text-muted);margin-bottom:4px;}
.chip{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:all 0.15s;}
.chip:hover{transform:scale(1.03);}
.cal-day.clash{background:rgba(239,68,68,0.04);}
.clash-dot{position:absolute;top:4px;right:4px;width:12px;height:12px;background:var(--red);border-radius:50%;font-size:8px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;animation:clash-p 2s infinite;}
@keyframes clash-p{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}50%{box-shadow:0 0 0 4px rgba(239,68,68,0);}}

/* Asset cards */
.asset-card{background:var(--glass);backdrop-filter:blur(16px) saturate(1.3);border-radius:12px;overflow:hidden;border:1px solid var(--glass-border);transition:all 0.25s;cursor:pointer;}
.asset-card:hover{border-color:rgba(232,200,107,0.2);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.25);}
.asset-img{height:110px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.asset-img .shimmer{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);animation:shimmer 3s infinite;}
@keyframes shimmer{0%{left:-100%;}100%{left:200%;}}
.asset-img .txt{font-size:15px;font-weight:700;color:white;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.5);z-index:1;}
.asset-img .txt small{display:block;font-size:9px;font-weight:400;opacity:0.7;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.asset-info{padding:10px 12px;}
.asset-info .at{font-size:9px;color:var(--teal-light);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;font-weight:600;}
.asset-info .an{font-size:12px;font-weight:600;margin-bottom:3px;}
.asset-info .am{font-size:10px;color:var(--text-muted);}
.grad-1{background:linear-gradient(135deg,#0a1628,#1a3a5c,var(--teal));}
.grad-2{background:linear-gradient(135deg,#0C1220,var(--navy),var(--teal-light));}
.grad-3{background:linear-gradient(135deg,#1a0a0a,#6e1a1a,var(--gold));}
.grad-4{background:linear-gradient(135deg,#0a2818,#1a6e3d,var(--teal));}
.grad-5{background:linear-gradient(135deg,#1a1508,var(--gold-dark),var(--gold-light));}
.grad-6{background:linear-gradient(135deg,#0a0a28,#2a1a6e,var(--teal-light));}

/* Heatmap */
.hm-cell{height:22px;border-radius:3px;cursor:pointer;position:relative;transition:transform 0.15s;}
.hm-cell:hover{transform:scale(1.15);z-index:2;}
.hm-cell .tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);border:1px solid rgba(232,200,107,0.2);padding:4px 8px;border-radius:6px;font-size:9px;white-space:nowrap;z-index:10;}
.hm-cell:hover .tip{display:block;}
.h0{background:rgba(255,255,255,0.02);}.h1{background:rgba(212,168,67,0.12);}.h2{background:rgba(212,168,67,0.25);}.h3{background:rgba(232,200,107,0.4);}.h4{background:rgba(232,200,107,0.65);}
.hm-label{font-size:9px;color:var(--text-muted);display:flex;align-items:center;}

/* Persona cards */
.persona{background:var(--glass);backdrop-filter:blur(16px);border-radius:12px;padding:16px;border:1px solid var(--glass-border);cursor:pointer;transition:all 0.25s;}
.persona:hover{border-color:rgba(232,200,107,0.2);box-shadow:0 6px 24px rgba(0,0,0,0.15);}
.persona-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.persona-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.persona-name{font-size:13px;font-weight:600;}
.persona-desc{font-size:11px;color:var(--text-muted);}
.persona-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
.ps{text-align:center;}
.ps .pv{font-size:18px;font-weight:800;color:var(--teal-light);}
.ps .pl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}

/* Journey */
.journey{display:flex;align-items:center;gap:0;overflow-x:auto;padding:16px 0;}
.j-step{flex-shrink:0;text-align:center;position:relative;}
.j-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 8px;border:2px solid rgba(255,255,255,0.08);background:var(--glass);backdrop-filter:blur(12px);transition:all 0.3s;}
.j-step.active .j-circle{border-color:var(--teal-light);background:rgba(212,168,67,0.15);box-shadow:0 0 16px rgba(232,200,107,0.15);}
.j-step.done .j-circle{border-color:var(--green);background:var(--green-bg);}
.j-label{font-size:10px;color:var(--text-muted);max-width:80px;margin:0 auto;}
.j-step.active .j-label{color:var(--teal-light);}
.j-arrow{width:40px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.1);font-size:14px;flex-shrink:0;margin-top:-20px;}

/* Sentiment */
.sentiment-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px;}
.sent-pos{background:var(--green);}.sent-neu{background:var(--text-muted);}.sent-neg{background:var(--red);}

/* Video cards */
.vid-card{background:var(--glass);backdrop-filter:blur(16px);border-radius:12px;overflow:hidden;border:1px solid var(--glass-border);transition:all 0.25s;}
.vid-card:hover{border-color:rgba(232,200,107,0.2);}
.vid-preview{height:120px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.vid-play{width:40px;height:40px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:1;cursor:pointer;transition:all 0.2s;}
.vid-play:hover{background:rgba(212,168,67,0.4);border-color:var(--teal-light);}
.vid-info{padding:10px;}
.vid-info .vt{font-size:12px;font-weight:600;margin-bottom:3px;}
.vid-info .vm{font-size:10px;color:var(--text-muted);}
.vid-dur{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);padding:2px 6px;border-radius:4px;font-size:9px;font-weight:500;}

/* Brand compliance */
.compliance-ring{width:100px;height:100px;position:relative;}
.compliance-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
.compliance-ring circle{fill:none;stroke-width:8;}
.compliance-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:800;color:var(--green);}
.brand-issue{display:flex;align-items:flex-start;gap:10px;padding:10px;background:rgba(255,255,255,0.02);border-radius:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.03);transition:all 0.2s;}
.brand-issue:hover{border-color:rgba(255,255,255,0.08);background:rgba(212,168,67,0.03);}
.bi-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;}
.bi-text h5{font-size:12px;font-weight:600;margin-bottom:2px;}
.bi-text p{font-size:10px;color:var(--text-muted);line-height:1.4;}

.prop-banner-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white;}
.prop-banner-info h2{font-size:18px;font-weight:700;}
.prop-banner-info p{font-size:12px;color:var(--text-muted);}
.prop-banner-stats{margin-left:auto;display:flex;gap:28px;}

.pbs .v{font-size:20px;font-weight:800;color:var(--teal-light);}
.pbs .l{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-bg.show{display:flex;}
.modal{background:rgba(15,23,42,0.85);backdrop-filter:blur(30px) saturate(1.6);border-radius:18px;border:1px solid rgba(255,255,255,0.1);padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;}
.modal h2{font-size:18px;font-weight:700;margin-bottom:18px;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);margin-bottom:5px;}
.mf input,.mf select,.mf textarea{width:100%;padding:9px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:all 0.2s;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(212,168,67,0.12);}
.mf textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(15,23,42,0.85);backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(232,200,107,0.2);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-size:12px;z-index:300;transform:translateY(80px);opacity:0;transition:all 0.35s ease-out;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;}

/* Line chart */
.line-chart{height:140px;position:relative;}
.line-chart svg{width:100%;height:100%;}
.line-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-top:4px;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12);}

/* Anim helpers */
@keyframes barGrow{from{height:0;}}
@keyframes countUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.anim-in{animation:countUp 0.4s ease-out backwards;}

/* Glowing accents */
.glow-teal{box-shadow:0 0 20px rgba(232,200,107,0.1);}
.glow-subtle{box-shadow:0 4px 20px rgba(0,0,0,0.2);}

// TOAST
function toast(t){const el=document.getElementById('toast');document.getElementById('toast-text').textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);}

// TAB & CHIP TOGGLE
function toggleTab(el){
  const parent=el.parentElement;
  parent.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const label=el.textContent;
  // Handle dashboard performance tabs
  if(label==='Engagement'||label==='Conversions'){
    const barsEl=parent.closest('.card').querySelector('.bars');
    if(barsEl){
      if(label==='Conversions') barsEl.innerHTML=barChart(['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],[18,14,22,20,31,38,28]);
      else barsEl.innerHTML=barChart(['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],[45,38,52,48,67,82,71]);
    }
  }
  // Handle analytics time period tabs
  if(label==='30D'||label==='90D'||label==='YTD'){
    toast('Showing '+label+' data');renderPage();
  }
  // Handle approvals view tabs
  if(label==='Board'||label==='List'||label==='Timeline'){
    toast(label+' view selected');
  }
  // Handle calendar view tabs
  if(label==='Month'||label==='Week'||label==='List'){
    toast(label+' view selected');
  }
}
function toggleChip(el){el.classList.toggle('active');}

// GLOBAL SEARCH
function initSearch(){
  const s=document.querySelector('.global-search');
  if(s){s.removeAttribute('onclick');s.addEventListener('input',function(){
    if(this.value.length>1)toast('Searching: '+this.value+'...');
  });s.addEventListener('focus',function(){toast('Type to search campaigns, properties, assets...');});}
}
